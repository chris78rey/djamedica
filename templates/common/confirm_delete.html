{% extends "base.html" %}

{% block title %}{{ page_title }} | Djamedica{% endblock %}

{% block content %}
    <div class="form-card">
        <span class="badge danger">Acción irreversible</span>
        <h1 class="page-title" style="margin-top:12px;">{{ page_title }}</h1>
        <p>Se confirmará la eliminación del registro:</p>
        <div class="card">
            <strong>{{ object }}</strong>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="actions">
                <button type="submit" class="danger">Eliminar</button>
                <a href="{{ cancel_url }}" class="secondary">Cancelar</a>
            </div>
        </form>
    </div>
{% endblock %}
