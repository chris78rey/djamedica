{% extends "base.html" %}

{% block title %}{{ page_title }} | Djamedica{% endblock %}

{% block content %}
    <h1>{{ page_title }}</h1>
    <p>Se confirmará la eliminación del registro: <strong>{{ object }}</strong></p>

    <form method="post">
        {% csrf_token %}
        <div class="actions">
            <button type="submit" class="danger">Eliminar</button>
            <a href="{{ cancel_url }}" class="secondary">Cancelar</a>
        </div>
    </form>
{% endblock %}
