{% extends "base.html" %}

{% block title %}Ingreso | Djamedica{% endblock %}

{% block content %}
    <h1>Ingreso al sistema</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="actions">
            <button type="submit">Ingresar</button>
            <a href="{% url 'register_choice' %}" class="secondary">Crear cuenta</a>
        </div>
    </form>
{% endblock %}
